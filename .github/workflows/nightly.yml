name: Nightly Model Retraining

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run retraining pipeline
      run: |
        python -c "
from src.pipeline.pipeline import SimpleOrchestrator
import json
import warnings
warnings.filterwarnings('ignore')

print('🚀 Starting nightly retraining...')
orchestrator = SimpleOrchestrator()
artifacts = orchestrator.run_full_training(retrain_reason='nightly_scheduled')

print(f'✅ Model retrained successfully!')
print(f'   RMSE: {artifacts[\"metrics\"][\"test_rmse\"]:.4f}')
print(f'   Training date: {artifacts[\"training_date\"]}')
"
    
    - name: Upload trained model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-${{ github.run_id }}
        path: models/production_model.pkl
        retention-days: 30
    
    - name: Check for model drift
      run: |
        python -c "
import pandas as pd
import numpy as np
from pathlib import Path
import json

print('🔍 Checking for model drift...')
drift_path = Path('monitoring/drift_report.json')
if drift_path.exists():
    with open(drift_path, 'r') as f:
        drift_data = json.load(f)
    print(f'   Last drift PSI: {drift_data.get(\"overall_psi\", 0):.4f}')
else:
    print('   No drift report found')
"
    
    - name: Send success notification
      if: success()
      run: |
        echo "✅ Nightly retraining completed successfully!"
        # Add Slack/Email notification here
        # curl -X POST -H 'Content-type: application/json' --data '{"text":"S&P 500 Predictor retrained successfully!"}' ${{ secrets.SLACK_WEBHOOK }}
    
    - name: Send failure notification
      if: failure()
      run: |
        echo "❌ Nightly retraining failed!"
        # Add Slack/Email notification here
        # curl -X POST -H 'Content-type: application/json' --data '{"text":"⚠️ S&P 500 Predictor retraining FAILED!"}' ${{ secrets.SLACK_WEBHOOK }}

  monitor-performance:
    runs-on: ubuntu-latest
    needs: retrain
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate performance report
      run: |
        python -c "
import json
from pathlib import Path
from datetime import datetime

print('📊 Generating performance report...')

# Load metrics
metrics_path = Path('models/training_metrics.json')
if metrics_path.exists():
    with open(metrics_path, 'r') as f:
        metrics = json.load(f)
    
    report = {
        'date': datetime.now().isoformat(),
        'metrics': metrics,
        'status': 'healthy'
    }
    
    with open('performance_report.json', 'w') as f:
        json.dump(report, f, indent=2)
    
    print(f'✅ Report generated: RMSE = {metrics.get(\"test_rmse\", 0):.4f}')
"
    
    - name: Upload performance report
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance_report.json
# Deployment Configuration for S&P 500 Predictor

# General Deployment
deployment:
  environment: production  # development, staging, production
  version: "2.0.0"
  debug: false
  log_level: INFO

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  reload: false
  ssl_enabled: false
  ssl_cert_path: null
  ssl_key_path: null
  cors_origins:
    - "*"
  rate_limit: "10/minute"
  rate_limit_burst: 20

# Dashboard Configuration
dashboard:
  host: 0.0.0.0
  port: 8501
  theme: dark
  browser_gather_usage: false
  max_upload_size_mb: 200

# Docker Configuration
docker:
  image_name: sp500-predictor
  image_tag: latest
  registry: docker.io
  repository: aammaramjad/sp500-predictor
  container_name: sp500-predictor-api
  restart_policy: unless-stopped
  network: predictor-network

# Kubernetes Configuration
kubernetes:
  namespace: default
  replicas: 3
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  health_check:
    path: /health
    port: 8000
    initial_delay: 30
    period: 10
  autoscaling:
    enabled: true
    min_replicas: 2
    max_replicas: 10
    cpu_target: 70
    memory_target: 80

# Database Configuration
database:
  type: sqlite  # sqlite, postgres, mysql
  sqlite_path: mlflow.db
  postgres:
    host: localhost
    port: 5432
    database: sp500_predictor
    user: predictor_user
    password: predictor_pass

# Cache Configuration
cache:
  type: redis  # memory, redis
  redis_host: localhost
  redis_port: 6379
  redis_db: 0
  ttl_seconds: 300

# Logging Configuration
logging:
  level: INFO
  format: json
  output: both  # console, file, both
  file_path: logs/api.log
  max_size_mb: 10
  backup_count: 5
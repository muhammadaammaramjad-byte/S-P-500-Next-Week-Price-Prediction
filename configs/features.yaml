# Feature Configuration for S&P 500 Predictor

# Feature Groups
feature_groups:
  price_features:
    - open
    - high
    - low
    - close
    - adj_close
  
  volume_features:
    - volume
    - volume_sma
    - volume_ratio
    - obv
  
  returns_features:
    - returns
    - log_returns
    - rolling_returns_5
    - rolling_returns_10
    - rolling_returns_20
  
  technical_indicators:
    - sma_20
    - sma_50
    - sma_200
    - ema_12
    - ema_26
    - rsi
    - macd
    - macd_signal
    - macd_diff
    - bb_upper
    - bb_middle
    - bb_lower
    - bb_width
    - bb_position
    - atr
    - atr_percent
  
  volatility_features:
    - volatility
    - volatility_20
    - volatility_60
    - price_vs_sma20
    - price_vs_sma50
    - price_vs_sma200
  
  momentum_features:
    - roc_5
    - roc_10
    - roc_20
    - williams_r
    - stochastic_k
    - stochastic_d
  
  fundamental_features:
    - pe_ratio
    - forward_pe
    - earnings_yield
    - earnings_growth
    - dividend_yield
    - payout_ratio
    - price_to_book
    - price_to_sales
    - profit_margins
    - return_on_equity
  
  sentiment_features:
    - sentiment_polarity
    - sentiment_subjectivity
    - sentiment_articles
    - sentiment_lag1
    - sentiment_lag3
    - sentiment_lag5

# Feature Selection
feature_selection:
  method: ensemble
  correlation_threshold: 0.05
  mutual_info_k: 25
  rfe_n_features: 20
  min_votes: 2

# Feature Reduction
feature_reduction:
  use_pca: false
  pca_variance_threshold: 0.95
  pca_components: 20
  use_tsne: false
  tsne_perplexity: 30

# Feature Store
feature_store:
  versioning: true
  storage_path: data/features
  format: parquet
  compression: snappy
  retention_days: 30
  max_versions: 10

# Feature Engineering
feature_engineering:
  lookback_periods:
    sma: [20, 50, 200]
    ema: [12, 26]
    volatility: [20, 60]
    momentum: [5, 10, 20]
  
  fill_method: ffill
  outlier_method: cap
  outlier_threshold: 3
  standardize: true
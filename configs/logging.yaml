# Logging Configuration for S&P 500 Predictor

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    format: '{"timestamp": "%(asctime)s", "name": "%(name)s", "level": "%(levelname)s", "message": "%(message)s"}'
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file_api:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/api.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

  file_predictions:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/predictions.log
    maxBytes: 10485760  # 10MB
    backupCount: 10

  file_errors:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

  file_training:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/training.log
    maxBytes: 10485760  # 10MB
    backupCount: 3

loggers:
  api:
    level: INFO
    handlers: [console, file_api]
    propagate: false
    qualname: api

  predictions:
    level: INFO
    handlers: [file_predictions]
    propagate: false
    qualname: predictions

  training:
    level: INFO
    handlers: [console, file_training]
    propagate: false
    qualname: training

  models:
    level: DEBUG
    handlers: [console, file_api]
    propagate: false
    qualname: models

root:
  level: INFO
  handlers: [console, file_api, file_errors]
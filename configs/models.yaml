# Model Configuration for S&P 500 Predictor

# CatBoost Configuration
catboost:
  iterations: 500
  depth: 6
  learning_rate: 0.1
  random_seed: 42
  verbose: false
  early_stopping_rounds: 50
  loss_function: RMSE
  eval_metric: RMSE
  task_type: CPU
  thread_count: -1
  od_type: Iter
  od_wait: 20

# XGBoost Configuration
xgboost:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.01
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  random_state: 42
  n_jobs: -1
  early_stopping_rounds: 50

# LightGBM Configuration
lightgbm:
  n_estimators: 300
  max_depth: 6
  num_leaves: 31
  learning_rate: 0.01
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0
  reg_lambda: 0
  random_state: 42
  n_jobs: -1
  verbose: -1

# Random Forest Configuration
random_forest:
  n_estimators: 200
  max_depth: 10
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: sqrt
  random_state: 42
  n_jobs: -1

# Ridge Regression
ridge:
  alpha: 1.0
  fit_intercept: true
  random_state: 42

# Lasso Regression
lasso:
  alpha: 0.01
  fit_intercept: true
  random_state: 42

# Ensemble Configuration
ensemble:
  voting:
    weights:
      catboost: 0.457
      xgboost: 0.326
      lightgbm: 0.070
      randomforest: 0.009
      ridge: 0.069
      lasso: 0.069
  stacking:
    meta_learner: ridge
    cv_folds: 5
    use_features: true

# Model Registry
model_registry:
  version: "2.0.0"
  production_model: "catboost"
  backup_models: ["xgboost", "lightgbm", "randomforest"]
  save_format: "joblib"
  compression: 3
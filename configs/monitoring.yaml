# Monitoring Configuration for S&P 500 Predictor

# Health Checks
health_checks:
  api:
    enabled: true
    endpoint: /health
    interval_seconds: 30
    timeout_seconds: 5
    retries: 3
  
  model:
    enabled: true
    check_interval_hours: 1
    max_age_days: 7
  
  data_source:
    enabled: true
    check_interval_hours: 6
    timeout_seconds: 10

# Metrics Collection
metrics:
  system:
    - cpu_usage
    - memory_usage
    - disk_usage
    - network_io
  
  api:
    - requests_per_second
    - average_response_time
    - error_rate
    - active_connections
  
  model:
    - prediction_count
    - average_prediction
    - prediction_std
    - model_version
  
  business:
    - bullish_percentage
    - bearish_percentage
    - average_confidence
    - recommendation_distribution

# Drift Detection
drift_detection:
  enabled: true
  method: psi  # psi, js_divergence, ks_test
  psi_threshold: 0.1
  feature_drift_threshold: 0.15
  check_interval_hours: 24
  baseline_samples: 1000
  current_samples: 1000

# Performance Monitoring
performance_monitoring:
  metrics:
    - rmse
    - mae
    - r2
    - direction_accuracy
    - sharpe_ratio
  evaluation_window_days: 30
  retraining_threshold_rmse: 0.035
  alert_on_degradation: true

# Alerts
alerts:
  enabled: true
  channels:
    - email
    - slack
    - webhook
  
  conditions:
    - metric: drift_psi
      threshold: 0.25
      severity: high
    - metric: error_rate
      threshold: 0.05
      severity: high
    - metric: response_time
      threshold: 2.0
      severity: medium
    - metric: prediction_volume
      threshold: 1000
      severity: info
  
  cooldown_minutes: 60

# Prometheus
prometheus:
  enabled: true
  port: 9090
  metrics_path: /metrics
  scrape_interval_seconds: 15
  scrape_timeout_seconds: 10

# Grafana
grafana:
  enabled: true
  port: 3000
  dashboard_path: monitoring/grafana/dashboards.json
  datasource: prometheus

# Logging
logging:
  structured: true
  fields:
    - timestamp
    - level
    - service
    - request_id
    - user_id
  retention_days: 30

# Notification Templates
notifications:
  email:
    smtp_server: smtp.gmail.com
    smtp_port: 587
    sender: alerts@sp500-predictor.com
    recipients:
      - admin@example.com
  
  slack:
    webhook_url: null  # Set in secrets
    channel: "#alerts"
    username: "S&P 500 Monitor"
  
  webhook:
    url: null
    method: POST
    headers:
      Content-Type: application/json
# Pipeline Configuration for S&P 500 Predictor

# Data Pipeline
data_pipeline:
  data_source: yahoo_finance
  ticker: ^GSPC
  start_date: 2010-01-01
  end_date: null  # auto to current date
  cache_ttl_hours: 6
  retry_attempts: 3
  retry_delay: 2

# Training Pipeline
training_pipeline:
  train_split_ratio: 0.8
  validation_split: 0.1
  test_split: 0.1
  random_seed: 42
  use_time_series_split: true
  cv_folds: 5
  shuffle: false

# Prediction Pipeline
prediction_pipeline:
  prediction_horizon: 5  # days
  confidence_threshold: 0.5
  cache_predictions: true
  cache_ttl_seconds: 300
  batch_size: 100

# Retraining Schedule
retraining:
  schedule: "0 2 * * *"  # Daily at 2 AM
  trigger_condition: 
    data_drift_psi: 0.1
    performance_degradation: 0.05
  max_retries: 3

# Feature Pipeline
feature_pipeline:
  refresh_frequency: daily
  compute_on_fly: true
  parallel_processing: true
  n_jobs: -1

# Model Pipeline
model_pipeline:
  auto_retrain: true
  retrain_on_drift: true
  version_on_train: true
  deploy_on_train: true
  notify_on_failure: true

# Monitoring Pipeline
monitoring_pipeline:
  metrics_interval_seconds: 60
  log_predictions: true
  log_features: false
  drift_check_interval_hours: 24
name: Crypto Arbitrage Bot - Enterprise CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'crypto-arbitrage-bot/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('crypto-arbitrage-bot/requirements.txt') }}
    
    - name: Install dependencies
      working-directory: ./crypto-arbitrage-bot
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-mock
    
    - name: Run tests with coverage
      working-directory: ./crypto-arbitrage-bot
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --tb=short
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./crypto-arbitrage-bot/coverage.xml
        flags: crypto-arbitrage
        name: crypto-arbitrage-coverage

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit security scan
      working-directory: ./crypto-arbitrage-bot
      run: |
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: crypto-arbitrage-bot/bandit-report.json

  docker-build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      working-directory: ./crypto-arbitrage-bot
      run: |
        docker build -t crypto-arbitrage-bot:latest -f Dockerfile .
        docker tag crypto-arbitrage-bot:latest ghcr.io/${{ github.repository_owner }}/crypto-arbitrage-bot:latest
    
    - name: Push to GitHub Container Registry
      if: github.event_name == 'push'
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker push ghcr.io/${{ github.repository_owner }}/crypto-arbitrage-bot:latest

services:
  # FastAPI Backend Service
  api:
    build: .
    container_name: sp500-predictor-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./monitoring:/app/monitoring
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://redis:6379
      - INSTITUTIONAL_API_KEY=${INSTITUTIONAL_API_KEY:-}
    depends_on:
      mlflow:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - predictor-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit Dashboard Service
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: sp500-predictor-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - API_URL=http://api:8000
      - PYTHONPATH=/app
      - ENVIRONMENT=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - predictor-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL for main app metadata
  postgres:
    image: postgres:15-alpine
    container_name: sp500-predictor-db
    environment:
      POSTGRES_DB: sp500_predictor
      POSTGRES_USER: predictor_user
      POSTGRES_PASSWORD: predictor_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictor_user -d sp500_predictor"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL for MLflow
  postgres_mlflow:
    image: postgres:15-alpine
    container_name: sp500-predictor-mlflow-db
    environment:
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: mlflow_pass
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
    networks:
      - predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_user -d mlflow_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MLflow Tracking Server (FIXED IMAGE)
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: sp500-predictor-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=postgresql://mlflow_user:mlflow_pass@postgres_mlflow:5432/mlflow_db
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri postgresql://mlflow_user:mlflow_pass@postgres_mlflow:5432/mlflow_db 
      --default-artifact-root /mlflow/artifacts
    depends_on:
      postgres_mlflow:
        condition: service_healthy
    networks:
      - predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mlflow", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: sp500-predictor-redis
    ports:
      - "6379:6379"
    networks:
      - predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: sp500-predictor-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - predictor-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    user: "0:0"  # Run as root to fix permission issues

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: sp500-predictor-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - predictor-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  postgres_mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  predictor-network:
    driver: bridge
apiVersion: v1
kind: ConfigMap
metadata:
  name: sp500-config
  namespace: default
data:
  config.yaml: |
    api:
      title: "S&P 500 Predictor API"
      version: "2.0.0"
      environment: "production"
    
    model:
      name: "catboost"
      version: "2.0.0"
      retrain_schedule: "0 2 * * *"
    
    logging:
      level: "INFO"
      format: "json"
    
    monitoring:
      enabled: true
      metrics_port: 8000
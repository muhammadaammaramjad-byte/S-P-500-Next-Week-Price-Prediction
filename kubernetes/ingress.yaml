apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sp500-predictor-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.sp500-predictor.com
    secretName: sp500-tls
  rules:
  - host: api.sp500-predictor.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sp500-predictor-api
            port:
              number: 80

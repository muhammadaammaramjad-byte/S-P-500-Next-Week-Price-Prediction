apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sp500-predictor-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: sp500-predictor
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
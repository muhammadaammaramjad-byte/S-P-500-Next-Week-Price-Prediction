apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sp500-predictor-monitor
  namespace: default
  labels:
    app: sp500-predictor
spec:
  selector:
    matchLabels:
      app: sp500-predictor
      component: api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - default
# XGBoost Model Configuration
model:
  name: XGBRegressor
  version: 1.0.0
  framework: xgboost
  framework_version: 2.1.0

hyperparameters:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.01
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  random_state: 42

performance:
  rmse: 0.0380
  mae: 0.0324
  r2: -2.8037
  direction_accuracy: 0.3729
  training_time_seconds: 35.2
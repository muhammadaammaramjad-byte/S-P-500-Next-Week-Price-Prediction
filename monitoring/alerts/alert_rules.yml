# Prometheus Alerting Rules for S&P 500 Predictor

groups:
  - name: api_alerts
    interval: 30s
    rules:
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(api_request_duration_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API response time is high"
          description: "95th percentile response time is {{ $value }}s"

      - alert: HighAPIErrorRate
        expr: rate(api_requests_total{status="error"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: LowAPIRequestRate
        expr: rate(api_requests_total[10m]) < 1
        for: 30m
        labels:
          severity: info
          component: api
        annotations:
          summary: "Low API traffic"
          description: "API is receiving less than 1 request per minute"

  - name: model_alerts
    interval: 1h
    rules:
      - alert: ModelPerformanceDegradation
        expr: model_rmse > 0.035
        for: 6h
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Model RMSE degraded"
          description: "Model RMSE is {{ $value | humanizePercentage }}"

      - alert: ModelNotTrained
        expr: model_last_training < (time() - 604800)
        for: 0m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Model not trained recently"
          description: "Last training was over 7 days ago"

      - alert: LowDirectionAccuracy
        expr: model_direction_accuracy < 0.35
        for: 12h
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Low directional accuracy"
          description: "Direction accuracy is {{ $value | humanizePercentage }}"

  - name: data_alerts
    interval: 1h
    rules:
      - alert: DataDriftDetected
        expr: data_drift_psi > 0.25
        for: 2h
        labels:
          severity: critical
          component: data
        annotations:
          summary: "Significant data drift detected"
          description: "PSI for {{ $labels.feature }} is {{ $value }}"

      - alert: DataQualityIssue
        expr: data_quality_score < 70
        for: 1h
        labels:
          severity: warning
          component: data
        annotations:
          summary: "Data quality degraded"
          description: "Quality score is {{ $value }}/100"

      - alert: HighMissingData
        expr: data_missing_percentage > 10
        for: 30m
        labels:
          severity: warning
          component: data
        annotations:
          summary: "High percentage of missing values"
          description: "Missing data for {{ $labels.feature }}: {{ $value }}%"

  - name: system_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: system_cpu_usage > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: system_memory_usage > 85
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      - alert: LowDiskSpace
        expr: system_disk_usage > 90
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value }}%"

      - alert: ServiceDown
        expr: up{job="sp500-predictor"} == 0
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Service is down"
          description: "{{ $labels.instance }} is unreachable"

  - name: business_alerts
    interval: 1h
    rules:
      - alert: ExtremeMarketSentiment
        expr: bullish_percentage > 80 or bearish_percentage > 80
        for: 6h
        labels:
          severity: info
          component: business
        annotations:
          summary: "Extreme market sentiment"
          description: "{{ if gt $value 80 }}Bullish{{ else }}Bearish{{ end }} sentiment is {{ $value }}%"

      - alert: LowConfidencePredictions
        expr: average_confidence < 30
        for: 2h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "Low confidence predictions"
          description: "Average confidence is {{ $value }}%"

      - alert: SuddenPredictionChange
        expr: abs(delta(prediction_value[1h])) > 0.05
        for: 0m
        labels:
          severity: info
          component: business
        annotations:
          summary: "Sudden prediction change"
          description: "Prediction changed by {{ $value | humanizePercentage }} in last hour"
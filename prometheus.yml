global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  # - "alerts.yml"

scrape_configs:
  - job_name: 'sp500-api'
    static_configs:
      - targets: ['api.sp500predictor.com:8000']
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-service:6379']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-service:5432']

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  startCommand = "python -m uvicorn src.api.institutional_api:app --host 0.0.0.0 --port $PORT"
  healthcheckPath = "/ping"
  healthcheckTimeout = 300
  numReplicas = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[deploy.metrics]
  path = "/ping"
  port = 8000
